openapi: 3.0.0
info:
  title: Finance Dashboard API
  version: 1.0.0
  description: |
    Role-based finance dashboard backend built for Zorvyn's assessment.
    
    **Roles and access:**
    - `viewer` — dashboard endpoints only
    - `analyst` — read transactions + dashboard
    - `admin` — full access including user management

servers:
  - url: http://localhost:5000/api
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [viewer, analyst, admin]
        isActive:
          type: boolean

    Transaction:
      type: object
      properties:
        _id:
          type: string
        amount:
          type: number
        type:
          type: string
          enum: [income, expense]
        category:
          type: string
          enum: [salary, marketing, infrastructure, operations, revenue, investment, refund, tax, other]
        description:
          type: string
        date:
          type: string
          format: date
        createdBy:
          type: object
          properties:
            name:
              type: string
            email:
              type: string

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: Jane Doe
                email:
                  type: string
                  example: jane@company.com
                password:
                  type: string
                  example: securepassword
      responses:
        "201":
          description: Registered successfully
        "409":
          description: Email already in use
        "422":
          description: Validation errors

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful, returns token
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get logged-in user's profile
      responses:
        "200":
          description: Returns current user
        "401":
          description: Not authenticated

  /users:
    get:
      tags: [Users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
        "403":
          description: Forbidden

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Update a user's role (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [viewer, analyst, admin]
      responses:
        "200":
          description: Role updated
        "403":
          description: Cannot change your own role

  /users/{id}/status:
    patch:
      tags: [Users]
      summary: Toggle user active/inactive (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status toggled

  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions with optional filters (analyst, admin)
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Paginated transaction list
        "403":
          description: Viewers cannot access raw transactions

    post:
      tags: [Transactions]
      summary: Create a new transaction (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Transaction"
      responses:
        "201":
          description: Transaction created
        "422":
          description: Validation errors

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Get a single transaction (analyst, admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction found
        "404":
          description: Not found

    patch:
      tags: [Transactions]
      summary: Update a transaction (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated

    delete:
      tags: [Transactions]
      summary: Soft delete a transaction (admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Soft deleted
        "404":
          description: Not found or already deleted

  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Get total income, expenses, and net balance (all roles)
      responses:
        "200":
          description: Financial summary

  /dashboard/categories:
    get:
      tags: [Dashboard]
      summary: Get spending grouped by category (all roles)
      responses:
        "200":
          description: Category breakdown

  /dashboard/trends:
    get:
      tags: [Dashboard]
      summary: Get monthly income vs expense trends (all roles)
      parameters:
        - in: query
          name: months
          schema:
            type: integer
            default: 6
            minimum: 1
            maximum: 24
      responses:
        "200":
          description: Monthly trend data
        "400":
          description: Invalid months param

  /dashboard/recent:
    get:
      tags: [Dashboard]
      summary: Get the 10 most recent transactions (all roles)
      responses:
        "200":
          description: Recent activity
